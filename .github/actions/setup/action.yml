name: Setup toolchain
description: >-
  Bun + Node + a frozen dependency install — the toolchain every build/check
  job needs. The caller must run actions/checkout BEFORE this: a local
  composite action only resolves once its own files are on disk, so the
  initial checkout cannot live in here.

runs:
  using: composite
  steps:
    # Third-party actions are pinned to commit SHAs to defend against tag
    # rewrites. Tag in the comment is the human-readable version.
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
      with:
        bun-version: latest
    # Astro itself runs under Node (its `#!/usr/bin/env node` shebang is much
    # faster than forcing the Bun runtime via `bun --bun`). Bun handles
    # install + the `bun scripts/*.ts` steps in the build script.
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: '24'
    # Cache the Bun global download cache + resolved node_modules, keyed on
    # the lockfile. Exact-hash hit → install is near-instant; a restore-key
    # partial hit still warms most of it. `--frozen-lockfile` guarantees the
    # restored tree is reconciled to the lockfile, so a stale cache cannot
    # drift the dependency set.
    - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809  # v4.2.4
      with:
        path: |
          ~/.bun/install/cache
          node_modules
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-
    - run: bun install --frozen-lockfile
      shell: bash
