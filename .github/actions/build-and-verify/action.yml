name: Build and verify
description: >-
  The single source of truth for how the site is built and what
  "shippable" means. Runs `bun run build`, whose final step is the
  post-build SEO/GEO gate (`bun scripts/check-seo.ts` — sitemap, llms.txt,
  canonical, OG, JSON-LD). Assumes the toolchain is already installed; run
  ./.github/actions/setup first.

inputs:
  site-url:
    description: >-
      Astro `site` origin (e.g. https://no2uid.github.io). Leave empty to
      let astro.config.mjs use its default — astro.config reads this with
      `??`, so it must stay UNSET (not ""), hence the conditional export.
    required: false
    default: ''
  base-path:
    description: >-
      Astro `base` sub-path (e.g. /rethink-aadhaar, or / at the apex).
      Same UNSET-not-empty contract as site-url.
    required: false
    default: ''

runs:
  using: composite
  steps:
    # Astro's content layer keeps a per-entry digest store in .astro/.
    # Restoring it lets `astro build` re-load only changed/added/removed
    # entries instead of all ~277. Key on content + config so any change
    # rolls the key; restore-keys still hands back the previous warm store
    # to update incrementally. astro check + the SEO/GEO gate below catch
    # any cache-staleness regression before merge.
    - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809  # v4.2.4
      with:
        path: .astro
        key: astro-${{ runner.os }}-${{ hashFiles('src/content/**', 'src/content.config.ts', 'astro.config.mjs') }}
        restore-keys: |
          astro-${{ runner.os }}-
    # The single biggest CI cost: scripts/optimize-images.ts regenerates a
    # .webp (and .avif for heroes) for ~281 sources with sharp on EVERY
    # run — the derivatives are gitignored, never committed. Cache them
    # keyed on the exact content of all source images + the script/options.
    # NO restore-keys on purpose: a partial restore could hand back a
    # stale derivative for an image changed in place (the script's skip
    # check is mtime-based, and cache restore lands newer than checkout).
    # Exact-key only → unchanged images = full skip (~0s, the normal
    # editor workflow); any image add/change = one clean full regen, then
    # re-cached. Correct by construction, no stale output.
    - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809  # v4.2.4
      with:
        path: |
          public/media/**/*.webp
          public/media/**/*.avif
        key: media-${{ runner.os }}-${{ hashFiles('public/media/**/*.jpg', 'public/media/**/*.jpeg', 'public/media/**/*.png', 'scripts/optimize-images.ts') }}
    - name: Build + SEO/GEO gate
      shell: bash
      # Inputs arrive via env (never interpolated into the script body —
      # no injection surface) and are exported ONLY when non-empty.
      # astro.config.mjs uses `process.env.X ?? default`, so an exported
      # empty string would override the default with "". Unset is correct.
      env:
        IN_SITE_URL: ${{ inputs.site-url }}
        IN_BASE_PATH: ${{ inputs.base-path }}
      run: |
        [ -n "$IN_SITE_URL" ] && export SITE_URL="$IN_SITE_URL"
        [ -n "$IN_BASE_PATH" ] && export BASE_PATH="$IN_BASE_PATH"
        bun run build
