name: pr-check

# Pre-merge gate. Runs only on PRs — pushes to main are covered by
# `deploy.yml`, which runs the same checks post-build on the deploy artefact.

on:
  pull_request:

# Mirror GitHub's PR-from-fork behaviour (read-only GITHUB_TOKEN) explicitly,
# so an internal PR from a feature branch cannot escalate either.
permissions:
  contents: read

# Iterative CMS edits push new commits to the same PR repeatedly. Cancel
# a still-running check the moment a newer commit supersedes it — only
# the latest commit's `check` gates the merge anyway, so the in-flight
# build is wasted minutes. Scoped per-PR; other PRs are unaffected.
concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Checkout must precede the local composite action: the runner only
      # resolves ./.github/actions/* once the repo is on disk. Pinned to
      # commit SHA — tag in comment is the human-readable version.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup
      - name: Lint + format check
        run: bun run check
      # No site-url/base-path: PR builds use astro.config.mjs defaults,
      # exactly as before. The composite's final step is the SEO/GEO gate.
      - uses: ./.github/actions/build-and-verify
