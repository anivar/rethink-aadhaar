name: seo-check

# Pre-merge SEO gate. Runs only on PRs — pushes to main are covered by
# `deploy.yml`, which runs the same check post-build on the deploy artefact
# (no point building twice).

on:
  pull_request:

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/check-seo.mjs
