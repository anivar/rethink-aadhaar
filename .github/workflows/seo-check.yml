name: seo-check

# Pre-merge SEO gate. Runs only on PRs — pushes to main are covered by
# `deploy.yml`, which runs the same check post-build on the deploy artefact
# (no point building twice).

on:
  pull_request:

# `pull_request` (not `pull_request_target`) gives GITHUB_TOKEN read-only
# perms on PRs from forks; we mirror that explicitly here so an internal PR
# from a feature branch cannot escalate either.
permissions:
  contents: read

jobs:
  seo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Pinned to commit SHA — tag in comment is the human-readable version.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/check-seo.mjs
