name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Resolve Pages base URL
        id: pages
        uses: actions/configure-pages@v5
      - name: Compute base path
        id: base
        run: |
          # configure-pages outputs base_url like https://anivar.github.io/rethink-aadhaar
          BASE_URL="${{ steps.pages.outputs.base_url }}"
          BASE_PATH=$(echo "$BASE_URL" | sed -E 's|^https?://[^/]+||')
          ORIGIN=$(echo "$BASE_URL" | sed -E 's|(^https?://[^/]+).*|\1|')
          [ -z "$BASE_PATH" ] && BASE_PATH="/"
          echo "base_path=$BASE_PATH" >> "$GITHUB_OUTPUT"
          echo "origin=$ORIGIN"      >> "$GITHUB_OUTPUT"
          echo "Origin=$ORIGIN  Base=$BASE_PATH"
      - name: Build
        env:
          # Astro `site` is the origin; `base` is the sub-path. JSON-LD,
          # canonical, sitemap and og:image all derive from these.
          SITE_URL:  ${{ steps.base.outputs.origin }}
          BASE_PATH: ${{ steps.base.outputs.base_path }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
