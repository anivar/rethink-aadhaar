name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Default to read-only at the workflow level; per-job blocks below escalate
# only what each job actually needs.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Third-party actions are pinned to commit SHAs to defend against
      # tag rewrites. Tag in the comment is the human-readable version.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest
      # Astro itself runs under Node (its `#!/usr/bin/env node` shebang is much
      # faster than forcing the Bun runtime via `bun --bun`). Bun handles
      # install + the `bun scripts/*.ts` steps in the build script.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
      - run: bun install --frozen-lockfile
      - name: Resolve Pages base URL
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      - name: Compute base path
        id: base
        run: |
          # configure-pages outputs base_url like https://anivar.github.io/rethink-aadhaar
          BASE_URL="${{ steps.pages.outputs.base_url }}"
          BASE_PATH=$(echo "$BASE_URL" | sed -E 's|^https?://[^/]+||')
          ORIGIN=$(echo "$BASE_URL" | sed -E 's|(^https?://[^/]+).*|\1|')
          [ -z "$BASE_PATH" ] && BASE_PATH="/"
          echo "base_path=$BASE_PATH" >> "$GITHUB_OUTPUT"
          echo "origin=$ORIGIN"      >> "$GITHUB_OUTPUT"
          echo "Origin=$ORIGIN  Base=$BASE_PATH"
      - name: Build
        env:
          # Astro `site` is the origin; `base` is the sub-path. JSON-LD,
          # canonical, sitemap and og:image all derive from these.
          SITE_URL:  ${{ steps.base.outputs.origin }}
          BASE_PATH: ${{ steps.base.outputs.base_path }}
        run: bun run build
      - name: SEO check (post-build)
        run: bun scripts/check-seo.ts
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
