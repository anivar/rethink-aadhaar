name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Default to read-only at the workflow level; per-job blocks below escalate
# only what each job actually needs (`pages: write` + `id-token: write` for
# the deploy job, nothing extra for build).
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Third-party actions are pinned to commit SHAs to defend against
      # tag rewrites. Tag in the comment is the human-readable version.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Resolve Pages base URL
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5.0.0
      - name: Compute base path
        id: base
        run: |
          # configure-pages outputs base_url like https://anivar.github.io/rethink-aadhaar
          BASE_URL="${{ steps.pages.outputs.base_url }}"
          BASE_PATH=$(echo "$BASE_URL" | sed -E 's|^https?://[^/]+||')
          ORIGIN=$(echo "$BASE_URL" | sed -E 's|(^https?://[^/]+).*|\1|')
          [ -z "$BASE_PATH" ] && BASE_PATH="/"
          echo "base_path=$BASE_PATH" >> "$GITHUB_OUTPUT"
          echo "origin=$ORIGIN"      >> "$GITHUB_OUTPUT"
          echo "Origin=$ORIGIN  Base=$BASE_PATH"
      - name: Build
        env:
          # Astro `site` is the origin; `base` is the sub-path. JSON-LD,
          # canonical, sitemap and og:image all derive from these.
          SITE_URL:  ${{ steps.base.outputs.origin }}
          BASE_PATH: ${{ steps.base.outputs.base_path }}
        run: npm run build
      - name: SEO check (post-build)
        run: node scripts/check-seo.mjs
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
