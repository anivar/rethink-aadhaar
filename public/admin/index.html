<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Rethink Aadhaar CMS</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <!--
      Decap CMS, pinned to an exact version with SRI so a compromised CDN
      cannot serve us a tampered bundle. To upgrade: bump the version in
      the URL, recompute the integrity hash with
        curl -sSL https://cdn.jsdelivr.net/npm/decap-cms@<ver>/dist/decap-cms.js \
          | openssl dgst -sha384 -binary | openssl base64 -A
      and update both fields in lockstep.

      The admin shell is harmless without OAuth — the GitHub login button
      will not produce a usable session unless `backend.base_url` in
      ./config.yml points at an OAuth proxy you control.
      See public/admin/README.md for setup.
    -->
  </head>
  <body>
    <script
      src="https://cdn.jsdelivr.net/npm/decap-cms@3.12.2/dist/decap-cms.js"
      integrity="sha384-Vwwn7nyPZTJRhuncX5Dci57xwjBjzTzQLSJefKuvOaT3x952fh4vT96UuHDi34zb"
      crossorigin="anonymous"
    ></script>
    <script>
      // Hide Decap's editorial-workflow delete control.
      //
      // Every collection sets `delete: false`, but in Decap 3.12.2 that
      // only suppresses delete for a published, unchanged entry. As soon
      // as an entry has unpublished changes (e.g. after toggling Draft and
      // Save) the toolbar shows a "Delete unpublished changes/entry"
      // button regardless — and there is no config flag to turn it off.
      //
      // In this repo that button is always dead: cms-automerge squash-
      // merges the draft PR and deletes its branch within ~1-2 min, so by
      // the time anyone clicks delete there is no open PR for Decap to act
      // on and it silently errors. Deletion is meant to go through the
      // "Delete entry (PR)" Action; unpublishing through the Draft toggle
      // (see ../../COLLABORATOR.md). Remove the misleading control.
      (function () {
        var pending = false;
        function sweep() {
          pending = false;
          var nodes = document.querySelectorAll('button,[role="button"]');
          for (var i = 0; i < nodes.length; i++) {
            var t = (nodes[i].textContent || '').trim();
            if (/^Delete (unpublished changes|unpublished entry|published entry)$/.test(t)) {
              nodes[i].style.display = 'none';
            }
          }
        }
        new MutationObserver(function () {
          if (pending) return;
          pending = true;
          requestAnimationFrame(sweep);
        }).observe(document.body, { childList: true, subtree: true });
        sweep();
      })();
    </script>
  </body>
</html>
