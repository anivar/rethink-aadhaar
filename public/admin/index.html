<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Content Manager — Rethink Aadhaar</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <!--
      Sveltia CMS, pinned to an exact version with SRI so a compromised CDN
      cannot serve us a tampered bundle. To upgrade: bump the version in
      the URL, recompute the integrity hash with
        curl -sSL https://cdn.jsdelivr.net/npm/@sveltia/cms@<ver>/dist/sveltia-cms.js \
          | openssl dgst -sha384 -binary | openssl base64 -A
      and update both fields in lockstep.

      The admin shell is harmless without OAuth — the GitHub login button
      will not produce a usable session unless `backend.base_url` in
      ./config.yml points at an OAuth proxy you control.
      See public/admin/README.md for setup.
    -->
  </head>
  <body>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@sveltia/cms@0.160.1/dist/sveltia-cms.js"
      integrity="sha384-DDDY69GD1bCvzusXnEkOgAZ/MVnNT0yYG8fe0+P0D/p4n68pQug2TYVPQ2LSZgLr"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
